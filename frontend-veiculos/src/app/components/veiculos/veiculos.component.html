<div class="container">

  <h1>Cadastro de Veículos</h1>

  <mat-card class="formulario">
    <mat-card-title>{{ editandoId ? 'Editar Veículo' : 'Novo Veículo' }}</mat-card-title>

    <form [formGroup]="formulario" (ngSubmit)="salvar()">

      <mat-form-field appearance="outline">
        <mat-label>Placa</mat-label>
        <input matInput formControlName="placa">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Chassi</mat-label>
        <input matInput formControlName="chassi">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Renavam</mat-label>
        <input matInput formControlName="renavam">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Modelo</mat-label>
        <input matInput formControlName="modelo">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="marca">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ano</mat-label>
        <input matInput formControlName="ano" type="number">
      </mat-form-field>

      <div class="botoes">
        <button mat-raised-button color="primary" type="submit">Salvar</button>
        <button mat-button type="button" (click)="cancelar()">Cancelar</button>
      </div>

    </form>
  </mat-card>

  <table mat-table [dataSource]="(veiculos$ | async) ?? []" class="tabela">

    <ng-container matColumnDef="placa">
      <th mat-header-cell *matHeaderCellDef>Placa</th>
      <td mat-cell *matCellDef="let v">{{ v.placa }}</td>
    </ng-container>

    <ng-container matColumnDef="modelo">
      <th mat-header-cell *matHeaderCellDef>Modelo</th>
      <td mat-cell *matCellDef="let v">{{ v.modelo }}</td>
    </ng-container>

    <ng-container matColumnDef="marca">
      <th mat-header-cell *matHeaderCellDef>Marca</th>
      <td mat-cell *matCellDef="let v">{{ v.marca }}</td>
    </ng-container>

    <ng-container matColumnDef="ano">
      <th mat-header-cell *matHeaderCellDef>Ano</th>
      <td mat-cell *matCellDef="let v">{{ v.ano }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let v">
        <button mat-icon-button color="primary" (click)="editar(v)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="excluir(v.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['placa','modelo','marca','ano','acoes']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['placa','modelo','marca','ano','acoes']"></tr>

  </table>

</div>
