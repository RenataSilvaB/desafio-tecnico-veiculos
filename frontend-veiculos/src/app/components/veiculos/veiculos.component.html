<div class="container">

  <div class="cabecalho">
    <h1>Cadastro de Veículos</h1>
    <button mat-raised-button color="primary" (click)="novo()">
      <mat-icon>add</mat-icon> Novo Veículo
    </button>
  </div>

  <table mat-table [dataSource]="(veiculos$ | async) ?? []" class="tabela">

    <ng-container matColumnDef="placa">
      <th mat-header-cell *matHeaderCellDef>Placa</th>
      <td mat-cell *matCellDef="let v">{{ v.placa }}</td>
    </ng-container>

    <ng-container matColumnDef="modelo">
      <th mat-header-cell *matHeaderCellDef>Modelo</th>
      <td mat-cell *matCellDef="let v">{{ v.modelo }}</td>
    </ng-container>

    <ng-container matColumnDef="marca">
      <th mat-header-cell *matHeaderCellDef>Marca</th>
      <td mat-cell *matCellDef="let v">{{ v.marca }}</td>
    </ng-container>

    <ng-container matColumnDef="ano">
      <th mat-header-cell *matHeaderCellDef>Ano</th>
      <td mat-cell *matCellDef="let v">{{ v.ano }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let v">
        <button mat-icon-button color="primary" (click)="editar(v)" aria-label="Editar veículo">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="excluir(v)" aria-label="Excluir veículo">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas"></tr>

  </table>

</div>
